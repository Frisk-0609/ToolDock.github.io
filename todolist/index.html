<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon"
      href="../favicon.ico">
  <meta charset="UTF-8">
  <link rel="stylesheet"
      href="../style.css">
  <meta name="description" content="無料で使えるシンプルなToDoリストアプリ。ブラウザだけで動作します。">
  <title>ToDoリスト | ToolDock</title>
  <link rel="stylesheet" href="todo.css">
  
<meta name="apple-mobile-web-app-title" content="Todoリスト | ToolDock">

<meta property="og:title" content="Todoリスト | ToolDock">

<meta property="og:description"
      content="シンプルなTodoリスト。完全Web・ブラウザだけで動作します。"
</head>
<body>

  <h1>ToDoリスト</h1>

  <input type="text" id="todoInput" placeholder="予定">
　<input type="date" id="todoDate" placeholder="日付">
　<input type="time" id="todoTime" placeholder="時間">
　<button onclick="addTodo()">追加</button>

  <ul id="todoList"></ul>

   <h1>Todoリスト</h1>
  <p>
  完全Webのみで使えるTodoリストです。
  データはブラウザのみで管理され、サーバーには送信されません。
  </p>

  <script src="todo.js"></script>

</body>
</html>
