<!DOCTYPE html>
<html lang="ja">
<head>
<script> const CURRENT_TOOL = "makejson"; </script> <script src="/js/tool-data.js"></script> <script src="/js/head.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px 15px;
            font-family: sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .description {
            margin-bottom: 30px;
            color: #555;
            line-height: 1.7;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            min-height: 280px;
            resize: vertical;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1rem;
            font-family: Consolas, monospace;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .format-btn {
            background: #2563eb;
            color: white;
        }

        .minify-btn {
            background: #0f766e;
            color: white;
        }

        .copy-btn {
            background: #444;
            color: white;
        }

        .clear-btn {
            background: #c62828;
            color: white;
        }

        .status {
            margin-top: 15px;
            font-weight: bold;
        }

        .success {
            color: #1b7f3b;
        }

        .error {
            color: #c62828;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .info-box {
            background: #eef3ff;
            border-radius: 10px;
            padding: 15px;
        }

        .info-title {
            font-size: 0.9rem;
            color: #555;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            color: #777;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.6rem;
            }

            .card {
                padding: 15px;
            }

            textarea {
                min-height: 220px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>JSON整形ツール</h1>

    <p class="description">
        JSONをリアルタイムで整形・圧縮・検証できる無料ツールです。
        Pretty PrintやMinifyに対応し、エラー位置も確認できます。
    </p>

    <div class="card">

        <label for="jsonInput">JSON入力</label>

        <textarea id="jsonInput" placeholder='{
  "name": "ToolDock",
  "type": "JSON Formatter"
}'></textarea>

        <div class="button-group">
            <button class="format-btn" onclick="formatJSON()">
                整形する
            </button>

            <button class="minify-btn" onclick="minifyJSON()">
                圧縮する
            </button>

            <button class="copy-btn" onclick="copyJSON()">
                コピー
            </button>

            <button class="clear-btn" onclick="clearJSON()">
                クリア
            </button>
        </div>

        <div class="status" id="status"></div>

        <div class="info-grid">

            <div class="info-box">
                <div class="info-title">文字数</div>
                <div class="info-value" id="charCount">0</div>
            </div>

            <div class="info-box">
                <div class="info-title">行数</div>
                <div class="info-value" id="lineCount">0</div>
            </div>

            <div class="info-box">
                <div class="info-title">サイズ</div>
                <div class="info-value" id="byteCount">0 B</div>
            </div>

        </div>

    </div>

    <footer>
        © ToolDock
    </footer>

</div>

<script>

    const jsonInput = document.getElementById("jsonInput");
    const statusDiv = document.getElementById("status");

    const charCount = document.getElementById("charCount");
    const lineCount = document.getElementById("lineCount");
    const byteCount = document.getElementById("byteCount");

    function updateStats() {

        const text = jsonInput.value;

        charCount.textContent = text.length;

        lineCount.textContent =
            text === "" ? 0 : text.split("\n").length;

        const bytes =
            new Blob([text]).size;

        byteCount.textContent =
            formatBytes(bytes);
    }

    function formatBytes(bytes) {

        if (bytes < 1024) {
            return bytes + " B";
        }

        if (bytes < 1024 * 1024) {
            return (bytes / 1024).toFixed(2) + " KB";
        }

        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function showSuccess(message) {

        statusDiv.className = "status success";
        statusDiv.textContent = "✓ " + message;
    }

    function showError(message) {

        statusDiv.className = "status error";
        statusDiv.textContent = "✗ " + message;
    }

    function formatJSON() {

        try {

            const parsed =
                JSON.parse(jsonInput.value);

            jsonInput.value =
                JSON.stringify(parsed, null, 4);

            showSuccess("JSONを整形しました");

            updateStats();

        } catch (e) {

            showError(e.message);
        }
    }

    function minifyJSON() {

        try {

            const parsed =
                JSON.parse(jsonInput.value);

            jsonInput.value =
                JSON.stringify(parsed);

            showSuccess("JSONを圧縮しました");

            updateStats();

        } catch (e) {

            showError(e.message);
        }
    }

    async function copyJSON() {

        try {

            await navigator.clipboard.writeText(
                jsonInput.value
            );

            showSuccess("コピーしました");

        } catch {

            showError("コピーに失敗しました");
        }
    }

    function clearJSON() {

        jsonInput.value = "";

        statusDiv.textContent = "";

        updateStats();
    }

    jsonInput.addEventListener("input", () => {

        updateStats();

        try {

            JSON.parse(jsonInput.value);

            if (jsonInput.value.trim() !== "") {
                showSuccess("有効なJSONです");
            } else {
                statusDiv.textContent = "";
            }

        } catch (e) {

            if (jsonInput.value.trim() !== "") {
                showError(e.message);
            } else {
                statusDiv.textContent = "";
            }
        }
    });

    updateStats();

</script>

</body>
</html>
