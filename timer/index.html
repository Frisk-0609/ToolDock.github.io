<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストップウォッチ＆タイマー</title>

<style>

body {
    font-family: sans-serif;
    background-color: white;
    color: black;
    text-align: center;
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 550px;
    margin: auto;
}

h1 {
    margin-bottom: 20px;
}

.mode-buttons {
    margin-bottom: 20px;
}

.time {
    font-size: 60px;
    margin: 30px 0;
    font-weight: bold;
}

button {
    font-size: 16px;
    padding: 10px 16px;
    margin: 5px;
    cursor: pointer;
}

.active {
    font-weight: bold;
}

.timer-setting {
    margin-bottom: 20px;
}

.timer-setting input {
    width: 70px;
    font-size: 16px;
    padding: 5px;
    text-align: center;
    margin: 0 5px;
}

.lap-area {
    margin-top: 30px;
    text-align: left;
    border-top: 1px solid #ccc;
    padding-top: 10px;
}

.lap {
    padding: 5px 0;
    border-bottom: 1px solid #ddd;
}

.description {
    margin-top: 40px;
    text-align: left;
    line-height: 1.8;
    border-top: 1px solid #ccc;
    padding-top: 20px;
    font-size: 15px;
}

.description h2 {
    font-size: 20px;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="container">

    <h1>ストップウォッチ＆タイマー</h1>

    <div class="mode-buttons">
        <button id="stopwatchMode" class="active">ストップウォッチ</button>
        <button id="timerMode">タイマー</button>
    </div>

    <div class="time" id="display">00:00:00</div>

    <div class="timer-setting" id="timerSetting" style="display:none;">

        <input type="number" id="hoursInput" min="0" value="0">
        時

        <input type="number" id="minutesInput" min="0" value="1">
        分

        <input type="number" id="secondsInput" min="0" value="0">
        秒

    </div>

    <div>
        <button id="startBtn">開始</button>
        <button id="pauseBtn">停止</button>
        <button id="resetBtn">リセット</button>
        <button id="lapBtn">ラップ</button>
    </div>

    <div class="lap-area" id="lapArea"></div>

    <div class="description">

        <h2>このサイトについて</h2>

        <p>
            このサイトでは、ストップウォッチとタイマーを利用できます。
            モード切替によって用途に応じた時間管理が可能です。
        </p>

        <p>
            タイマーは「時間・分・秒」を指定できます。
            タイマー終了時には通知音とアラートが表示されます。
        </p>

    </div>

</div>

<script>

let mode = "stopwatch";

let timer = null;

let elapsed = 0;
let startTime = 0;

let remaining = 0;

const display = document.getElementById("display");
const lapArea = document.getElementById("lapArea");

const stopwatchModeBtn = document.getElementById("stopwatchMode");
const timerModeBtn = document.getElementById("timerMode");

const timerSetting = document.getElementById("timerSetting");

const hoursInput = document.getElementById("hoursInput");
const minutesInput = document.getElementById("minutesInput");
const secondsInput = document.getElementById("secondsInput");

function formatTime(ms) {

    const totalSeconds = Math.floor(ms / 1000);

    const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');

    const minutes = String(
        Math.floor((totalSeconds % 3600) / 60)
    ).padStart(2, '0');

    const seconds = String(
        totalSeconds % 60
    ).padStart(2, '0');

    return `${hours}:${minutes}:${seconds}`;
}

function updateDisplay() {

    if (mode === "stopwatch") {
        display.textContent = formatTime(elapsed);
    } else {
        display.textContent = formatTime(remaining);
    }
}

function switchMode(newMode) {

    clearInterval(timer);

    timer = null;

    elapsed = 0;
    remaining = 0;

    updateDisplay();

    lapArea.innerHTML = "";

    mode = newMode;

    if (mode === "stopwatch") {

        stopwatchModeBtn.classList.add("active");
        timerModeBtn.classList.remove("active");

        timerSetting.style.display = "none";

        document.getElementById("lapBtn").style.display = "inline-block";

    } else {

        timerModeBtn.classList.add("active");
        stopwatchModeBtn.classList.remove("active");

        timerSetting.style.display = "block";

        document.getElementById("lapBtn").style.display = "none";
    }
}

stopwatchModeBtn.onclick = () => switchMode("stopwatch");
timerModeBtn.onclick = () => switchMode("timer");

document.getElementById("startBtn").onclick = () => {

    if (timer) return;

    if (mode === "stopwatch") {

        startTime = Date.now() - elapsed;

        timer = setInterval(() => {

            elapsed = Date.now() - startTime;

            updateDisplay();

        }, 10);

    } else {

        if (remaining <= 0) {

            const hours = Number(hoursInput.value);
            const minutes = Number(minutesInput.value);
            const seconds = Number(secondsInput.value);

            remaining =
                (hours * 3600 +
                 minutes * 60 +
                 seconds) * 1000;
        }

        if (remaining <= 0) {
            alert("時間を設定してください。");
            return;
        }

        const endTime = Date.now() + remaining;

        timer = setInterval(() => {

            remaining = endTime - Date.now();

            if (remaining <= 0) {

                remaining = 0;

                clearInterval(timer);

                timer = null;

                updateDisplay();

                playBeep();

                alert("タイマー終了！");
                return;
            }

            updateDisplay();

        }, 10);
    }
};

document.getElementById("pauseBtn").onclick = () => {

    clearInterval(timer);

    timer = null;
};

document.getElementById("resetBtn").onclick = () => {

    clearInterval(timer);

    timer = null;

    elapsed = 0;
    remaining = 0;

    updateDisplay();

    lapArea.innerHTML = "";
};

document.getElementById("lapBtn").onclick = () => {

    if (mode !== "stopwatch") return;

    const lap = document.createElement("div");

    lap.className = "lap";

    const count = lapArea.children.length + 1;

    lap.textContent = `Lap ${count} : ${formatTime(elapsed)}`;

    lapArea.prepend(lap);
};

function playBeep() {

    const audioContext =
        new (window.AudioContext || window.webkitAudioContext)();

    const oscillator = audioContext.createOscillator();

    const gainNode = audioContext.createGain();

    oscillator.connect(gainNode);

    gainNode.connect(audioContext.destination);

    oscillator.type = "sine";

    oscillator.frequency.value = 880;

    oscillator.start();

    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);

    gainNode.gain.exponentialRampToValueAtTime(
        0.001,
        audioContext.currentTime + 1
    );

    oscillator.stop(audioContext.currentTime + 1);
}

updateDisplay();

</script>

</body>
</html>
