<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Webタイマー</title>
    <script src="./js/clock.js"></script>
    <link rel="stylesheet" href="./css/style.css">
  </head>

  <body>
    <h1>Webタイマー</h1>

    <div id="timerApp">

  <div id="timerInput">
    <input type="number" id="minutes" placeholder="分">
    <input type="number" id="seconds" placeholder="秒">
  </div>

  <p id="timerString">00:00</p>

  <div id="timerButton">
    <input type="button" value="スタート" onClick="OnStartButtonClick();">
    <input type="button" value="ストップ" onClick="OnStopButtonClick();">
    <input type="button" value="リセット" onClick="OnResetButtonClick();">
  </div>

</div>

  </body>
</html>
