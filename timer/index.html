<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon"
      href="../favicon.ico">
<meta charset="UTF-8">
<link rel="stylesheet"
      href="../style.css">
<meta name="description" content="シンプルなストップウォッチ・タイマー。完全Web・ブラウザだけで動作します。">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストップウォッチ＆タイマー</title>

<style>
body {
    font-family: sans-serif;
    background: white;
    color: black;
    text-align: center;
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 550px;
    margin: auto;
}

h1 {
    margin-bottom: 20px;
}

.mode-buttons {
    margin-bottom: 20px;
}

.time {
    font-size: 60px;
    font-weight: bold;
    margin: 30px 0;
}

button {
    font-size: 16px;
    padding: 10px 16px;
    margin: 5px;
}

.active {
    font-weight: bold;
}

.timer-setting input {
    width: 70px;
    padding: 5px;
    font-size: 16px;
    text-align: center;
}

.flash {
    animation: flash 0.3s 3;
}

@keyframes flash {
    0% { background: white; }
    50% { background: black; color: white; }
    100% { background: white; color: black; }
}
</style>
</head>

<body>

<div class="container">

<h1>ストップウォッチ＆タイマー</h1>

<div class="mode-buttons">
    <button id="stopwatchBtn" class="active">ストップウォッチ</button>
    <button id="timerBtn">タイマー</button>
</div>

<div class="time" id="display">00:00:00</div>

<div class="timer-setting" id="timerSetting" style="display:none;">
    <input id="h" type="number" value="0">時
    <input id="m" type="number" value="1">分
    <input id="s" type="number" value="0">秒
</div>

<div>
    <button id="start">開始</button>
    <button id="pause">停止</button>
    <button id="reset">リセット</button>
</div>

</div>

<h1>Webタイマー</h1>
    
シンプルで使いやすいタイマー・ストップウォッチです。
上部タブからタイマー・ストップウォッチを切り替えられます。
タイマー終了時には、音が鳴ります。(消音モードでは鳴りません。)
    
<script>

let mode = "stopwatch";

let timer = null;

let startTime = 0;
let endTime = 0;

let audioCtx = null;

const display = document.getElementById("display");
const body = document.body;

const stopwatchBtn = document.getElementById("stopwatchBtn");
const timerBtn = document.getElementById("timerBtn");
const timerSetting = document.getElementById("timerSetting");

function format(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const h = String(Math.floor(s / 3600)).padStart(2,"0");
    const m = String(Math.floor((s % 3600)/60)).padStart(2,"0");
    const sec = String(s % 60).padStart(2,"0");
    return `${h}:${m}:${sec}`;
}

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
}

function beep() {
    ensureAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 880;

    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 1);
}

function vibrate() {
    if (navigator.vibrate) {
        navigator.vibrate([200,100,200,100,300]);
    }
}

function flash() {
    body.classList.add("flash");
    setTimeout(() => body.classList.remove("flash"), 900);
}

function update() {
    const now = Date.now();

    if (mode === "stopwatch") {
        display.textContent = format(now - startTime);
    } else {
        display.textContent = format(endTime - now);
    }
}

function setMode(m) {

    clearInterval(timer);
    timer = null;

    mode = m;

    if (mode === "stopwatch") {
        stopwatchBtn.classList.add("active");
        timerBtn.classList.remove("active");
        timerSetting.style.display = "none";
    } else {
        timerBtn.classList.add("active");
        stopwatchBtn.classList.remove("active");
        timerSetting.style.display = "block";
    }

    display.textContent = "00:00:00";
}

stopwatchBtn.onclick = () => setMode("stopwatch");
timerBtn.onclick = () => setMode("timer");

function startStopwatch() {
    startTime = Date.now();
    clearInterval(timer);
    timer = setInterval(update, 30);
}

function startTimer() {

    const h = Number(document.getElementById("h").value);
    const m = Number(document.getElementById("m").value);
    const s = Number(document.getElementById("s").value);

    const duration = (h*3600 + m*60 + s) * 1000;

    if (duration <= 0) return;

    startTime = Date.now();
    endTime = startTime + duration;

    clearInterval(timer);

    timer = setInterval(() => {

        const now = Date.now();
        const remaining = endTime - now;

        update();

        if (remaining <= 0) {

            clearInterval(timer);
            timer = null;

            display.textContent = "00:00:00";

            flash();
            vibrate();

            for (let i = 0; i < 5; i++) {
                setTimeout(() => beep(), i * 150);
            }

        }

    }, 30);
}

document.getElementById("start").onclick = () => {
    ensureAudio();
    if (mode === "stopwatch") startStopwatch();
    else startTimer();
};

document.getElementById("pause").onclick = () => {
    clearInterval(timer);
    timer = null;
};

document.getElementById("reset").onclick = () => {
    clearInterval(timer);
    timer = null;
    display.textContent = "00:00:00";
};

setMode("stopwatch");

</script>

</body>
</html>
