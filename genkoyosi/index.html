<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原稿用紙お試しエディタ</title>
<style>
    body {
        margin: 0;
        padding: 24px;
        background: #ffffff;
        font-family: sans-serif;
        color: #222;
    }

    h1 {
        margin-top: 0;
    }

    .controls {
        margin-bottom: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
    }

    button {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        background: #8b5e3c;
        color: white;
        cursor: pointer;
        font-size: 14px;
    }

    button:hover {
        background: #6f4a2f;
    }

    .info {
        font-size: 14px;
        line-height: 1.7;
    }

    .sheet {
        display: grid;
        grid-template-columns: repeat(20, 1fr);
        gap: 0;
        width: fit-content;
        border: 2px solid #7b3f00;
        background: #fffdf8;
        user-select: none;
    }

    .cell {
        width: 34px;
        height: 34px;
        border: 1px solid #c89f65;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
        position: relative;
        background: white;
    }

    .cell.active {
        background: #fff0d8;
    }

    .cell.punctuation::before {
        content: attr(data-char);
        position: absolute;
        top: 1px;
        right: 3px;
        font-size: 18px;
    }

    .cell.punctuation {
        color: transparent;
    }

    .counter {
        margin-left: auto;
        font-weight: bold;
    }

    @media (max-width: 900px) {
        .cell {
            width: 28px;
            height: 28px;
            font-size: 18px;
        }

        .cell.punctuation::before {
            font-size: 15px;
        }
    }
</style>
</head>
<body>

<h1>原稿用紙お試しエディタ</h1>

<div class="controls">
    <button id="clearBtn">全消去</button>
    <button id="indentBtn">字下げを入れる</button>
    <div class="counter">文字数: <span id="count">0</span></div>
</div>

<div class="info">
    ・キーボード入力で直接書き込めます。<br>
    ・全角ひらがな・漢字に対応しています。<br>
    ・「、」「。」は右上に配置されます。<br>
    ・Enterキーで改行します。<br>
    ・Backspaceで削除できます。<br>
    ・1行目冒頭に字下げを入れたい場合は「字下げを入れる」を押してください。
</div>

<br>

<div id="sheet" class="sheet"></div>

<script>
    const COLS = 20;
    const ROWS = 20;
    const TOTAL = COLS * ROWS;

    const sheet = document.getElementById('sheet');
    const countDisplay = document.getElementById('count');

    const cells = [];
    let cursor = 0;
    let data = Array(TOTAL).fill('');

    function createSheet() {
        for (let i = 0; i < TOTAL; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            sheet.appendChild(cell);
            cells.push(cell);
        }
        updateDisplay();
    }

    function updateDisplay() {
        for (let i = 0; i < TOTAL; i++) {
            const cell = cells[i];
            const ch = data[i];

            cell.classList.remove('active');
            cell.classList.remove('punctuation');
            cell.textContent = '';
            cell.dataset.char = '';

            if (ch === '、' || ch === '。') {
                cell.classList.add('punctuation');
                cell.dataset.char = ch;
            } else {
                cell.textContent = ch;
            }
        }

        if (cursor >= 0 && cursor < TOTAL) {
            cells[cursor].classList.add('active');
        }

        const count = data.filter(v => v !== '').length;
        countDisplay.textContent = count;
    }

    function moveToNextLine() {
        const row = Math.floor(cursor / COLS);
        cursor = (row + 1) * COLS;

        if (cursor >= TOTAL) {
            cursor = TOTAL - 1;
        }
    }

    function insertChar(ch) {
        if (cursor >= TOTAL) return;

        data[cursor] = ch;

        if (cursor < TOTAL - 1) {
            cursor++;
        }

        updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey || e.metaKey) return;

        if (e.key === 'Backspace') {
            e.preventDefault();

            if (cursor > 0 && data[cursor] === '') {
                cursor--;
            }

            data[cursor] = '';
            updateDisplay();
            return;
        }

        if (e.key === 'Enter') {
            e.preventDefault();
            moveToNextLine();
            updateDisplay();
            return;
        }

        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            cursor = Math.max(0, cursor - 1);
            updateDisplay();
            return;
        }

        if (e.key === 'ArrowRight') {
            e.preventDefault();
            cursor = Math.min(TOTAL - 1, cursor + 1);
            updateDisplay();
            return;
        }

        if (e.key === 'ArrowUp') {
            e.preventDefault();
            cursor = Math.max(0, cursor - COLS);
            updateDisplay();
            return;
        }

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            cursor = Math.min(TOTAL - 1, cursor + COLS);
            updateDisplay();
            return;
        }

        if (e.key.length === 1) {
            e.preventDefault();
            insertChar(e.key);
        }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        data = Array(TOTAL).fill('');
        cursor = 0;
        updateDisplay();
    });

    document.getElementById('indentBtn').addEventListener('click', () => {
        if (data[0] === '') {
            data[0] = '　';
            cursor = 1;
            updateDisplay();
        }
    });

    createSheet();
</script>

</body>
</html>
