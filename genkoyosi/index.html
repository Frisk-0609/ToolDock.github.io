<!DOCTYPE html>
<html lang="ja">
<head>
<script> const CURRENT_TOOL = "genkoyosi"; </script> <script src="/js/tool-data.js"></script> <script src="/js/head.js"></script>
<style>
body{
    margin:0;
    padding:30px;
    background:#f5f1e8;
    font-family:sans-serif;
    color:#222;
}

h1{
    margin-top:0;
    margin-bottom:10px;
    font-size:30px;
}

#counter{
    margin-bottom:18px;
    font-size:18px;
}

textarea{
    width:100%;
    height:220px;

    font-size:18px;
    line-height:1.8;

    padding:18px;
    box-sizing:border-box;

    resize:vertical;

    border:2px solid #7d5a36;
    border-radius:12px;

    background:#fffdf8;

    margin-bottom:40px;
}

#preview{
    display:flex;
    flex-wrap:wrap;
    gap:50px;
}

.page{
    width:842px;
    height:842px;

    display:grid;
    grid-template-columns:repeat(20, 40px);
    grid-template-rows:repeat(20, 40px);

    border:3px solid #7a4f2a;

    background:#fffaf0;

    box-shadow:0 4px 14px rgba(0,0,0,0.08);

    position:relative;
}

.cell{
    width:40px;
    height:40px;

    border:1px solid #c6a98b;

    box-sizing:border-box;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;

    font-family:
        "Yu Mincho",
        "Hiragino Mincho ProN",
        "MS Mincho",
        serif;

    color:#222;

    position:relative;

    overflow:visible;
}

.empty{
    color:transparent;
}

/* 行末句読点 */
.hanging{
    position:absolute;

    right:-11px;
    top:50%;

    transform:translateY(-50%);

    z-index:10;

    background:#fffaf0;

    pointer-events:none;
}
</style>
</head>

<body>

<h1>原稿用紙風エディタ</h1>

<div id="counter">
文字数：0 ／ 400
</div>

<textarea id="editor" placeholder="ここに文章を入力してください。"></textarea>

<div id="preview"></div>

<h2>原稿用紙風エディタ</h2>

書いたテキストを、原稿用紙の書式に起こすためのツールです。<br>
字下げ・改行・句読点の処理に対応しています。

<script>
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const counter = document.getElementById("counter");

const ROWS = 20;
const COLS = 20;
const PAGE_SIZE = ROWS * COLS;

editor.addEventListener("input", render);

function render(){

    let text = editor.value;

    // 原稿用紙上の文字数
    let count = 0;

    for(let ch of text){

        if(ch !== "\n"){
            count++;
        }
    }

    counter.textContent =
        `文字数：${count} ／ ${PAGE_SIZE}`;

    // 行ごとに字下げ
    let lines = text.split("\n");

    for(let i=0;i<lines.length;i++){

        if(lines[i].length > 0){

            if(!lines[i].startsWith("　")){
                lines[i] = "　" + lines[i];
            }
        }
    }

    text = lines.join("\n");

    preview.innerHTML = "";

    let pages = [];
    let current = [];

    for(let i=0;i<text.length;i++){

        let ch = text[i];

        // 改行
        if(ch === "\n"){

            while(current.length % COLS !== 0){

                current.push({
                    char:"",
                    empty:true
                });
            }

            continue;
        }

        // 行頭禁則
        if((ch === "。" || ch === "、") &&
           current.length % COLS === 0 &&
           current.length > 0){

            let prev = current[current.length - 1];

            prev.hanging = ch;

            continue;
        }

        current.push({
            char:ch
        });

        // ページ送り
        if(current.length >= PAGE_SIZE){

            pages.push(current);
            current = [];
        }
    }

    if(current.length > 0){
        pages.push(current);
    }

    if(pages.length === 0){
        pages.push([]);
    }

    // 描画
    for(let p=0;p<pages.length;p++){

        let page = document.createElement("div");
        page.className = "page";

        let data = pages[p];

        for(let i=0;i<PAGE_SIZE;i++){

            let cell = document.createElement("div");
            cell.className = "cell";

            if(i < data.length){

                let item = data[i];

                if(item.empty){

                    cell.classList.add("empty");
                    cell.textContent = "　";

                }else{

                    cell.textContent = item.char || "";

                    // 行末ぶら下げ句読点
                    if(item.hanging){

                        let span = document.createElement("span");

                        span.className = "hanging";
                        span.textContent = item.hanging;

                        cell.appendChild(span);
                    }
                }

            }else{

                cell.classList.add("empty");
                cell.textContent = "　";
            }

            page.appendChild(cell);
        }

        preview.appendChild(page);
    }
}

render();
</script>

<div id="related-tools"></div>
<script src="/js/related.js"></script>
</body>
</html>
