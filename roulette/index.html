<!DOCTYPE html>
<html lang="ja">
<head>
  
<script> const CURRENT_TOOL = "roulette"; </script> <script src="/js/tool-data.js"></script> <script src="/js/head.js"></script>

<style>
  body {
    text-align: center;
    font-family: sans-serif;
    background: #f2f2f2;
    margin: 0;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; }

  #result {
    font-size: 22px;
    font-weight: bold;
    height: 30px;
    margin-bottom: 10px;
    color: #e74c3c;
  }

  .wrapper {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 0 auto;
  }

  canvas {
    background: white;
    border-radius: 50%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  /* 下向き三角針 */
  .pointer {
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;

    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 30px solid #e74c3c;

    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4));
    z-index: 10;
  }

  input {
    width: 280px;
    padding: 6px;
    margin-top: 10px;
  }

  button {
    padding: 8px 14px;
    margin-left: 5px;
  }
</style>
</head>

<body>

<h1>🎯 Webルーレット</h1>

<div id="result"></div>

<div class="wrapper">
  <div class="pointer"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<input id="itemInput" placeholder="A,B,C,D,E">
<button onclick="updateItems()">更新</button>
<button onclick="spin()">回す</button>

<h1>Webルーレット</h1>
<p>
完全ブラウザのみで使えるルーレットです。
抽選候補を「,」で区切って入力してください。
</p>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const resultEl = document.getElementById("result");

let items = [];
let colors = [];
let angle = 0;
let spinning = false;

const STORAGE_KEY = "roulette_top_pointer";

// ======================
// 保存
// ======================
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function load() {
  const data = localStorage.getItem(STORAGE_KEY);
  items = data ? JSON.parse(data) : ["A","B","C","D","E"];
}

// ======================
// 色
// ======================
function genColors(n) {
  return Array.from({length:n}, (_,i)=>
    `hsl(${i*360/n},80%,60%)`
  );
}

// ======================
// 描画（盤面回転）
// ======================
function draw() {
  const n = items.length;
  if (!n) return;

  const arc = (2*Math.PI)/n;

  ctx.clearRect(0,0,400,400);

  for (let i=0;i<n;i++) {
    const start = angle + i*arc;

    ctx.beginPath();
    ctx.moveTo(200,200);
    ctx.arc(200,200,180,start,start+arc);
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(start + arc/2);
    ctx.fillStyle="#000";
    ctx.textAlign="right";
    ctx.fillText(items[i],160,5);
    ctx.restore();
  }

  // 中心点
  ctx.beginPath();
  ctx.arc(200,200,6,0,Math.PI*2);
  ctx.fillStyle="#333";
  ctx.fill();
}

// ======================
// 判定
// ======================
function getResultIndex() {
  const n = items.length;
  const arc = (2*Math.PI)/n;

  let normalized = (2*Math.PI - angle - Math.PI/2) % (2*Math.PI);
  if (normalized < 0) normalized += 2*Math.PI;

  return Math.floor(normalized / arc) % n;
}

// ======================
// スピン
// ======================
function spin() {
  if (spinning || !items.length) return;

  spinning = true;
  resultEl.textContent = "";

  let speed = 0.35;
  const decel = 0.0025;

  function step() {
    if (speed <= 0) {
      spinning = false;

      const result = getResultIndex();
      resultEl.textContent = "🎉 当たり: " + items[result];
      return;
    }

    angle += speed;
    speed -= decel;

    draw();
    requestAnimationFrame(step);
  }

  step();
}

// ======================
// 更新
// ======================
function updateItems() {
  const input = document.getElementById("itemInput").value;

  if (input.trim()) {
    items = input.split(",").map(v=>v.trim()).filter(Boolean);
  }

  colors = genColors(items.length);
  save();
  draw();
}

// ======================
// 初期化
// ======================
function init() {
  load();
  colors = genColors(items.length);

  document.getElementById("itemInput").value = items.join(",");

  draw();
}

init();
</script>

<div class="retro-counter">

    🌐 あなたは
    <span id="total-counter">...</span>
    人目のお客様です。

    <br>

    <span id="page-counter">...</span>
    回閲覧されました。

</div>

<div id="related-tools"></div>
<script src="/js/related.js"></script>
</body>
</html>
