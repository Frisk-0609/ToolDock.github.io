@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: radial-gradient(circle at top, #102030, #05070d 60%), #05070d;
  color: #e8ffff;
  font-family: "Consolas", "Courier New", monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
}

.container { width: min(1000px, 95%); margin: 40px auto; }

h1 {
  text-align: center;
  font-size: 2.2rem;
  font-family: 'Orbitron', 'Consolas', monospace;
  font-weight: 700;
  color: #00e5ff;
  text-shadow:
    0 0 6px #00e5ff,
    0 0 18px rgba(0,229,255,0.4),
    0 0 40px rgba(0,229,255,0.15);
  letter-spacing: 0.05em;
  margin-bottom: 10px;
}

.subtitle { text-align: center; color: #9fd9e3; margin-bottom: 30px; }

.panel {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,229,255,0.15), inset 0 0 20px rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
}

.controls { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; }

select, button {
  background: #09141d;
  color: #dfffff;
  border: 1px solid #00e5ff;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 1rem;
}

button { cursor: pointer; transition: 0.2s; }
button:hover { background: #00e5ff; color: #000; box-shadow: 0 0 15px #00e5ff; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 30px;
}

.stat-box {
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 14px;
  padding: 15px;
  text-align: center;
}

.stat-label { color: #9fcbd2; font-size: 0.9rem; }
.stat-value { font-size: 2rem; color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }

.word-area { text-align: center; margin-bottom: 35px; }

.katakana {
  font-size: 3rem;
  margin-bottom: 10px;
  color: #ffffff;
  text-shadow: 0 0 15px rgba(255,255,255,0.4);
  min-height: 70px;
}

.roma { font-size: 1.5rem; color: #77f7ff; letter-spacing: 2px; min-height: 35px; }

.input-view {
  margin-top: 20px;
  font-size: 1.4rem;
  min-height: 40px;
  word-break: break-all;
}

.correct { color: #00ff99; text-shadow: 0 0 10px #00ff99; }
.current { color: #fff; border-bottom: 2px solid #fff; }
.remaining { color: #6c8a95; }

.combo {
  text-align: center;
  margin-top: 10px;
  font-size: 1.3rem;
  color: #ffcc00;
  text-shadow: 0 0 12px #ffcc00;
}

.message { text-align: center; margin-top: 20px; color: #ff6b6b; min-height: 25px; }

.keyboard { margin-top: 40px; display: flex; flex-direction: column; gap: 8px; }

.key-row { display: flex; justify-content: center; gap: 8px; }

.key {
  width: 45px;
  height: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  transition: 0.05s;
}

.key.active {
  background: #00e5ff;
  color: #000;
  box-shadow: 0 0 15px #00e5ff;
  transform: scale(1.08);
}

.result { margin-top: 30px; text-align: center; display: none; }
.result h2 { color: #00ff99; margin-bottom: 10px; }

.description { margin-top: 60px; line-height: 1.9; color: #cde7ea; }

.miss-shake { animation: missShake 0.25s ease-out; }

@keyframes missShake {
  0%   { transform: translateX(0); }
  25%  { transform: translateX(-5px); }
  75%  { transform: translateX(5px); }
  100% { transform: translateX(0); }
}

@media (max-width: 700px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .katakana { font-size: 2rem; }
  .roma { font-size: 1.1rem; }
}

<div class="container">

      </div>
    </div>

    <div class="word-area">
      <div class="katakana" id="katakana">PRESS START</div>
      <div class="roma" id="roma"></div>
      <div class="input-view" id="inputView"></div>
      <div class="combo" id="comboText"></div>
      <div class="message" id="message"></div>
    </div>

    <div class="keyboard" id="keyboard"></div>

    <div class="result" id="result">

  </div>

  <div class="description">
    <h2>このタイピングゲームについて</h2>
    <p>
      「横文字ばっかりのタイピングゲーム」は、
      IT用語・ビジネス用語・SNS用語などのカタカナ語を
      英単語入力で高速タイピングする無料ブラウザゲームです。

    <p>

      サイバー風UIとネオン演出で、気持ちよくタイピング練習できます。
    </p>
  </div>
</div>

// ============================================================
// ゲームロジック
// ============================================================

const katakanaEl   = document.getElementById("katakana");
const romaEl       = document.getElementById("roma");
const inputView    = document.getElementById("inputView");
const messageEl    = document.getElementById("message");
const comboText    = document.getElementById("comboText");
const startBtn     = document.getElementById("startBtn");
const resultEl     = document.getElementById("result");
const finalScore   = document.getElementById("finalScore");
const wpmEl        = document.getElementById("wpm");
const accuracyEl   = document.getElementById("accuracy");
const comboEl      = document.getElementById("combo");
const timeEl       = document.getElementById("time");
const genreSelect  = document.getElementById("genre");
const difficultySelect = document.getElementById("difficulty");

let currentWord  = null;
let currentIndex = 0;
let combo        = 0;
let correct      = 0;
let miss         = 0;
let typed        = 0;
let gameTime     = 60;
let timer        = null;
let started      = false;

// 直近に出た単語をトラッキングして重複を防ぐ
let recentWords  = [];
const RECENT_MAX = 10;

function createKeyboard() {
  const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
  const keyboard = document.getElementById("keyboard");
  rows.forEach(row => {
    const rowEl = document.createElement("div");
    rowEl.className = "key-row";
    row.split("").forEach(char => {
      const key = document.createElement("div");
      key.className = "key";
      key.textContent = char;
      key.id = `key-${char}`;
      rowEl.appendChild(key);
    });
    keyboard.appendChild(rowEl);
  });
}

createKeyboard();

function pickWord() {
  const genre = genreSelect.value;
  const level = difficultySelect.value;

  let filtered = words.filter(w => w.level === level);
  if (genre !== "all") {
    filtered = filtered.filter(w => w.genre === genre);
  }

  // 直近に出た単語を避ける（候補が十分あれば）
  let pool = filtered.filter(w => !recentWords.includes(w.roma));
  if (pool.length === 0) pool = filtered;

  currentWord  = pool[Math.floor(Math.random() * pool.length)];
  currentIndex = 0;

  recentWords.push(currentWord.roma);
  if (recentWords.length > RECENT_MAX) recentWords.shift();

  katakanaEl.textContent = currentWord.jp;
  romaEl.textContent     = currentWord.roma;

  updateInputView();
}

function updateInputView() {
  const typedPart   = currentWord.roma.slice(0, currentIndex);
  const currentChar = currentWord.roma[currentIndex] || "";
  const remainPart  = currentWord.roma.slice(currentIndex + 1);

  inputView.innerHTML = `
    <span class="correct">${typedPart}</span>
    <span class="current">${currentChar}</span>
    <span class="remaining">${remainPart}</span>
  `;
}

function updateStats() {
  const total    = correct + miss;
  const accuracy = total === 0 ? 100 : Math.round((correct / total) * 100);
  accuracyEl.textContent = accuracy + "%";
  comboEl.textContent    = combo;

  const minutes = (60 - gameTime) / 60;
  if (minutes > 0) {
    wpmEl.textContent = Math.round((typed / 5) / minutes);
  }
}

function startGame() {
  started      = true;
  combo        = 0;
  correct      = 0;
  miss         = 0;
  typed        = 0;
  gameTime     = 60;
  recentWords  = [];

  resultEl.style.display = "none";
  messageEl.textContent  = "";
  comboText.textContent  = "";

  pickWord();
  updateStats();
  timeEl.textContent = gameTime;

  clearInterval(timer);
  timer = setInterval(() => {
    gameTime--;
    timeEl.textContent = gameTime;
    updateStats();
    if (gameTime <= 0) endGame();
  }, 1000);
}

function endGame() {
  started = false;
  clearInterval(timer);

  katakanaEl.textContent = "FINISHED";
  romaEl.textContent     = "";
  inputView.innerHTML    = "";

  resultEl.style.display = "block";
  finalScore.innerHTML   = `
    WPM: ${wpmEl.textContent}<br>
    Accuracy: ${accuracyEl.textContent}<br>
    Max Combo: ${combo}
  `;
}

startBtn.addEventListener("click", prepareGame);

// ── Web Audio Context（遅延初期化） ──────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// キータイプ音：短いクリック
function playKeyClick() {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = "square";
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.04);
  gain.gain.setValueAtTime(0.07, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.05);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.05);
}

// 単語クリア音：ピン！
function playPing() {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = "sine";
  osc.frequency.setValueAtTime(1800, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(2400, ctx.currentTime + 0.03);
  osc.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.18);
  gain.gain.setValueAtTime(0.18, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.22);
}

// ミス音：boo（低くこもった音）
function playBoo() {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  osc.type = "sawtooth";
  filter.type = "lowpass";
  filter.frequency.value = 300;
  osc.frequency.setValueAtTime(160, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.18);
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.22);
}

// ── 待機状態フラグ ─────────────────────────────────────────
let waiting = false;  // ゲーム開始ボタン押後・スペース待ち

function prepareGame() {
  // すでにゲーム中なら無視
  if (started) return;

  waiting = true;
  katakanaEl.textContent = "SPACE でスタート";
  romaEl.textContent     = "";
  inputView.innerHTML    = "";
  messageEl.textContent  = "";
  comboText.textContent  = "";
  startBtn.textContent   = "待機中…";
  startBtn.disabled      = true;
}

function startGame() {
  waiting      = false;
  started      = true;
  combo        = 0;
  correct      = 0;
  miss         = 0;
  typed        = 0;
  gameTime     = 60;
  recentWords  = [];

  startBtn.textContent = "ゲーム開始";
  startBtn.disabled    = false;

  resultEl.style.display = "none";
  messageEl.textContent  = "";
  comboText.textContent  = "";

  pickWord();
  updateStats();
  timeEl.textContent = gameTime;

  clearInterval(timer);
  timer = setInterval(() => {
    gameTime--;
    timeEl.textContent = gameTime;
    updateStats();
    if (gameTime <= 0) endGame();
  }, 1000);
}

function endGame() {
  started = false;
  clearInterval(timer);

  startBtn.textContent = "ゲーム開始";
  startBtn.disabled    = false;

  katakanaEl.textContent = "FINISHED";
  romaEl.textContent     = "";
  inputView.innerHTML    = "";

  resultEl.style.display = "block";
  finalScore.innerHTML   = `
    WPM: ${wpmEl.textContent}<br>
    Accuracy: ${accuracyEl.textContent}<br>
    Max Combo: ${combo}
  `;
}

function activateKey(key) {
  const el = document.getElementById(`key-${key.toUpperCase()}`);
  if (!el) return;
  el.classList.add("active");
  setTimeout(() => el.classList.remove("active"), 80);
}

function shakeMissArea() {
  const area = document.querySelector(".word-area");
  area.classList.add("miss-shake");
  setTimeout(() => area.classList.remove("miss-shake"), 250);
}

document.addEventListener("keydown", e => {
  // スペースキーで待機状態からスタート
  if (waiting && e.code === "Space") {
    e.preventDefault();
    startGame();
    return;
  }

  if (!started) return;
  if (!/^[a-zA-Z]$/.test(e.key)) return;

  activateKey(e.key);

  const expected = currentWord.roma[currentIndex];

  if (e.key.toLowerCase() === expected.toLowerCase()) {
    currentIndex++;
    correct++;
    typed++;
    combo++;

    playKeyClick();
    comboText.textContent = `${combo} COMBO`;
    messageEl.textContent = "";

    updateInputView();
    if (currentIndex >= currentWord.roma.length) {
      playPing();
      pickWord();
    }
  } else {
    miss++;
    combo = 0;
    playBoo();
    shakeMissArea();
    comboText.textContent = "";
    messageEl.textContent = "MISS";
  }

  updateStats();
});
</script>
