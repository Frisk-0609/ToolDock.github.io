<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet"
      href="../style.css">
  <meta name="description" content="シンプルな文字数カウンタ。完全Web・ブラウザだけで動作します。">
  <title>文字数カウント | ToolDock</title>
</head>
<body>

  <h1>文字数カウント</h1>

  <textarea placeholder="ここに文章を入力"
            style="width: 90%; height: 300px;"></textarea>

  <button id="reset">リセット</button>

  <p>文字数：<span id="count">0</span></p>
  <p>文字数（改行・スペースを含めない）：<span id="count_ns">0</span></p>


  
  <h1>文字数カウントツール</h1>
  <p>
  文章の文字数をリアルタイムで確認できる
  無料ツールです。
  レポート、SNS投稿、記事制作などに使えます。
  </p>

<script>
  const textarea = document.querySelector("textarea");
  const count = document.getElementById("count");
  const count_ns = document.getElementById("count_ns");
  const resetButton = document.getElementById("reset");

  textarea.addEventListener("input", () => {

    // 通常文字数
    count.textContent = textarea.value.length;

    // 空白・改行なし文字数
    const noSpace = textarea.value.replace(/\s/g, "");
    count_ns.textContent = noSpace.length;
  });

  resetButton.addEventListener("click", () => {
    textarea.value = "";
    count.textContent = 0;
    count_ns.textContent = 0;
  });
</script>

</body>
</html>
